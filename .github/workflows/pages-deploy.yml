name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Validate site files
        run: |
          test -d assets || { echo "Missing required directory: assets"; exit 1; }
          test -f index.html || { echo "Missing required file: index.html"; exit 1; }
          test -f favicon.png || { echo "Missing required file: favicon.png"; exit 1; }

      - name: Prepare Pages content
        run: |
          mkdir -p _site
          cp -R assets _site/assets
          cp index.html _site/index.html
          cp favicon.png _site/favicon.png

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Log initial deployment failure
        if: steps.deploy.outcome == 'failure'
        run: echo "Initial deployment attempt failed. Retrying once..."

      - name: Retry deploy to GitHub Pages
        id: deploy_retry
        if: steps.deploy.outcome == 'failure'
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Fail if deployment did not recover
        if: steps.deploy.outcome == 'failure' && steps.deploy_retry.outcome == 'failure'
        run: |
          echo "Deployment failed on both attempts."
          exit 1
